<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riego Mi Majayura</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#58a6ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Riego">
  <link rel="apple-touch-icon" href="/assets/icons/icon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Russo+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0d1117;
      --card:    #161b22;
      --border:  #21262d;
      --green:   #3fb950;
      --blue:    #58a6ff;
      --text:    #e6edf3;
      --muted:   #8b949e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Fondo animado con partículas de agua */
    .bg-anim {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(63,185,80,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(88,166,255,0.08) 0%, transparent 50%),
        var(--bg);
      z-index: 0;
    }

    .drop {
      position: absolute;
      width: 4px;
      border-radius: 50% 50% 60% 60%;
      background: linear-gradient(180deg, var(--blue) 0%, var(--green) 100%);
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { opacity: 0; transform: translateY(-20px); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(100vh); }
    }

    .login-card {
      position: relative;
      z-index: 10;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5),
                  0 0 0 1px rgba(255,255,255,0.04);
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand .icon {
      font-size: 3.5rem;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-8px); }
    }

    .brand h1 {
      font-family: 'Russo One', sans-serif;
      font-size: 1.55rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #58a6ff 0%, #3fb950 60%, #a3e635 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 0.75rem;
    }

    .brand p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    .form-label {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    .form-control {
      background: #0d1117;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      background: #0d1117;
      border-color: var(--blue);
      color: var(--text);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
      outline: none;
    }

    .btn-login {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, var(--green) 0%, #2ea043 100%);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }

    .btn-login:hover   { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active  { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .alert-error {
      background: rgba(248,81,73,0.12);
      border: 1px solid rgba(248,81,73,0.3);
      color: #f85149;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }

    .footer-text {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .dot-verde {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 4px;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="bg-anim" id="bgAnim"></div>

  <div class="login-card">
    <div class="brand">
      <span class="icon">💧</span>
      <h1>RIEGO MI MAJAYURA</h1>
      <p>Majayura · La Guajira · Colombia</p>
    </div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" id="usuario" class="form-control" placeholder="Usuario" autocomplete="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <div style="position:relative">
          <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required style="padding-right:2.8rem">
          <button type="button" id="btnVerPass" onclick="togglePass()" style="position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:0.2rem;font-size:1.1rem;line-height:1" title="Ver/ocultar contraseña">👁</button>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Verificación</label>
        <div style="display:flex;gap:0.5rem;align-items:center;margin-bottom:0.5rem">
          <span id="captchaPregunta" style="font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:600;color:#58a6ff;flex:1">Cargando...</span>
          <button type="button" onclick="cargarCaptcha()" title="Recargar" style="background:none;border:none;color:#8b949e;cursor:pointer;font-size:1rem;padding:0">↻</button>
        </div>
        <input type="number" id="captchaRespuesta" class="form-control" placeholder="Tu respuesta" required autocomplete="off">
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        Ingresar al Sistema
      </button>

      <div class="alert-error" id="alertError"></div>
    </form>

    <div style="text-align:center;margin-top:1rem">
      <button onclick="mostrarRecuperar()" style="background:none;border:none;color:var(--muted);font-size:0.8rem;cursor:pointer;text-decoration:underline;padding:0">
        ¿Olvidaste tu contraseña?
      </button>
    </div>

    <!-- Panel recuperar contraseña -->
    <div id="panelRecuperar" style="display:none;margin-top:1.25rem;border-top:1px solid #21262d;padding-top:1.25rem">
      <p style="font-size:0.82rem;color:var(--muted);margin-bottom:0.75rem">Ingresa el correo registrado en el sistema y recibirás un enlace para restablecer la contraseña.</p>
      <input type="email" id="correoRecuperar" placeholder="tucorreo@ejemplo.com" style="width:100%;background:#0d1117;border:1px solid #21262d;color:var(--text);border-radius:8px;padding:0.55rem 0.85rem;font-size:0.9rem;margin-bottom:0.75rem;outline:none">
      <button onclick="enviarRecuperar()" id="btnRecuperar" style="width:100%;padding:0.65rem;background:transparent;border:1px solid var(--green);color:var(--green);font-weight:600;border-radius:8px;cursor:pointer;font-size:0.9rem">
        Enviar correo de recuperación
      </button>
      <div id="msgRecuperar" style="display:none;margin-top:0.75rem;font-size:0.82rem;padding:0.5rem 0.75rem;border-radius:8px"></div>
    </div>

    <div style="text-align:center;margin-top:1.25rem;padding-top:1rem;border-top:1px solid #21262d;font-size:0.72rem;color:#8b949e;line-height:1.6">
      Desarrollado por <a href="https://uniguajira.edu.co/" target="_blank" rel="noopener" style="color:#58a6ff;text-decoration:none;font-weight:700">UniGuajira</a> 2026<br>
      Todos los derechos reservados
    </div>
  </div>

  <script>
    // ── Gotas de lluvia animadas ────────────────────────────────
    const bg = document.getElementById('bgAnim');
    for (let i = 0; i < 20; i++) {
      const drop = document.createElement('div');
      drop.className = 'drop';
      const size = Math.random() * 3 + 2;
      drop.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${size}px;
        height: ${size * 2.5}px;
        animation-duration: ${Math.random() * 4 + 3}s;
        animation-delay: ${Math.random() * 5}s;
      `;
      bg.appendChild(drop);
    }

    // ── CAPTCHA ─────────────────────────────────────────────────
    let captchaToken = '';

    async function cargarCaptcha() {
      try {
        const data = await fetch('/api/auth/captcha').then(r => r.json());
        captchaToken = data.token;
        document.getElementById('captchaPregunta').textContent = data.pregunta;
        document.getElementById('captchaRespuesta').value = '';
      } catch {
        document.getElementById('captchaPregunta').textContent = 'Error al cargar';
      }
    }
    cargarCaptcha();

    // ── Ver/ocultar contraseña ──────────────────────────────────
    function togglePass() {
      const input = document.getElementById('password');
      const btn   = document.getElementById('btnVerPass');
      const mostrar = input.type === 'password';
      input.type  = mostrar ? 'text' : 'password';
      btn.textContent = mostrar ? '🙈' : '👁';
    }

    // ── Login ───────────────────────────────────────────────────
    const form    = document.getElementById('loginForm');
    const btn     = document.getElementById('btnLogin');
    const errDiv  = document.getElementById('alertError');

    function mostrarError(msg) {
      errDiv.textContent = msg;
      errDiv.style.display = 'block';
      setTimeout(() => { errDiv.style.display = 'none'; }, 4000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Verificando...';
      errDiv.style.display = 'none';

      const usuario          = document.getElementById('usuario').value.trim();
      const password         = document.getElementById('password').value;
      const captchaRespuesta = document.getElementById('captchaRespuesta').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, password, captchaToken, captchaRespuesta })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('riego_token', data.token);
          localStorage.setItem('riego_usuario', data.usuario);
          window.location.href = '/index.html';
        } else {
          mostrarError(data.error || 'Credenciales incorrectas');
          cargarCaptcha(); // nuevo CAPTCHA en cada intento fallido
        }
      } catch (err) {
        mostrarError('No se pudo conectar al servidor. Verifica tu conexión.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ingresar al Sistema';
      }
    });

    // Redirigir si ya tiene token válido
    const token = localStorage.getItem('riego_token');
    if (token) {
      fetch('/api/auth/verificar', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(r => r.json()).then(d => {
        if (d.valido) window.location.href = '/index.html';
      }).catch(() => {});
    }

    // ── Recuperar contraseña ────────────────────────────────────
    function mostrarRecuperar() {
      const panel = document.getElementById('panelRecuperar');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    async function enviarRecuperar() {
      const correo = document.getElementById('correoRecuperar').value.trim();
      const btn    = document.getElementById('btnRecuperar');
      const msg    = document.getElementById('msgRecuperar');
      if (!correo) return;

      btn.disabled = true;
      btn.textContent = 'Enviando...';
      msg.style.display = 'none';

      try {
        const res  = await fetch('/api/auth/recuperar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ correo })
        });
        const data = await res.json();
        msg.style.display = 'block';
        if (res.ok) {
          msg.style.background = 'rgba(63,185,80,0.12)';
          msg.style.color = '#3fb950';
          msg.style.border = '1px solid rgba(63,185,80,0.3)';
          msg.textContent = data.mensaje || 'Correo enviado.';
        } else {
          msg.style.background = 'rgba(248,81,73,0.12)';
          msg.style.color = '#f85149';
          msg.style.border = '1px solid rgba(248,81,73,0.3)';
          msg.textContent = data.error || 'Error al enviar.';
        }
      } catch {
        msg.style.display = 'block';
        msg.textContent = 'Error de conexión.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enviar correo de recuperación';
      }
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
