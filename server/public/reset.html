<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riego IOT — Restablecer contraseña</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0d1117;--card:#161b22;--border:#21262d;--green:#3fb950;--blue:#58a6ff;--red:#f85149;--text:#e6edf3;--muted:#8b949e; }
    * { box-sizing:border-box;margin:0;padding:0; }
    body { background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem; }
    .card { background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,0.5); }
    .brand { text-align:center;margin-bottom:2rem; }
    .brand .icon { font-size:3rem;display:block;margin-bottom:0.75rem; }
    .brand h1 { font-size:1.3rem;font-weight:700; }
    .brand p  { font-size:0.8rem;color:var(--muted);margin-top:0.25rem; }
    label { display:block;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);margin-bottom:0.4rem; }
    input { width:100%;background:#0d1117;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:0.6rem 0.9rem;font-family:'JetBrains Mono',monospace;font-size:0.9rem;outline:none;transition:border-color 0.2s; }
    input:focus { border-color:var(--blue);box-shadow:0 0 0 3px rgba(88,166,255,0.15); }
    .mb { margin-bottom:1rem; }
    .btn { width:100%;padding:0.75rem;background:linear-gradient(135deg,var(--green) 0%,#2ea043 100%);color:#fff;font-weight:600;font-size:0.95rem;border:none;border-radius:8px;cursor:pointer;margin-top:0.5rem;transition:opacity 0.2s; }
    .btn:hover { opacity:0.9; }
    .btn:disabled { opacity:0.45;cursor:not-allowed; }
    .msg { margin-top:1rem;padding:0.6rem 0.9rem;border-radius:8px;font-size:0.85rem;display:none; }
    .msg.ok  { background:rgba(63,185,80,0.12);border:1px solid rgba(63,185,80,0.3);color:var(--green); }
    .msg.err { background:rgba(248,81,73,0.12);border:1px solid rgba(248,81,73,0.3);color:var(--red); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="icon">💧</span>
      <h1>Restablecer contraseña</h1>
      <p>Riego Mi Majayura · La Guajira</p>
    </div>

    <div id="formWrap">
      <div class="mb">
        <label>Nueva contraseña</label>
        <input type="password" id="claveNueva" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <div class="mb">
        <label>Confirmar contraseña</label>
        <input type="password" id="claveConfirm" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn" id="btnReset" onclick="resetear()">Guardar nueva contraseña</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (!token) {
      document.getElementById('formWrap').innerHTML =
        '<p style="color:#f85149;text-align:center">Enlace inválido. Solicita uno nuevo desde el login.</p>';
    }

    async function resetear() {
      const claveNueva   = document.getElementById('claveNueva').value;
      const claveConfirm = document.getElementById('claveConfirm').value;
      const btn = document.getElementById('btnReset');
      const msg = document.getElementById('msg');
      msg.className = 'msg'; msg.style.display = 'none';

      if (claveNueva.length < 6) return mostrarMsg('La contraseña debe tener mínimo 6 caracteres.', 'err');
      if (claveNueva !== claveConfirm) return mostrarMsg('Las contraseñas no coinciden.', 'err');

      btn.disabled = true; btn.textContent = 'Guardando...';

      try {
        const res  = await fetch('/api/auth/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, claveNueva })
        });
        const data = await res.json();
        if (res.ok) {
          mostrarMsg('✓ ' + data.mensaje, 'ok');
          setTimeout(() => window.location.href = '/login.html', 2500);
        } else {
          mostrarMsg(data.error || 'Error al restablecer.', 'err');
          btn.disabled = false; btn.textContent = 'Guardar nueva contraseña';
        }
      } catch {
        mostrarMsg('Error de conexión.', 'err');
        btn.disabled = false; btn.textContent = 'Guardar nueva contraseña';
      }
    }

    function mostrarMsg(texto, tipo) {
      const msg = document.getElementById('msg');
      msg.textContent = texto;
      msg.className = 'msg ' + tipo;
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
